<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #container {
            display: grid;
            grid-template-columns: 2fr 3fr;
        }
        #map, #story {
     height: 100vh;
        }
        #story {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #text {
            flex: 1;
            overflow-y: auto;
        }
        .close-welcome-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #7f8c8d;
            padding: 0 5px;
        }
        .storyLegend {
            border: 2px solid #411093;
            background: #fff;
            color: #000;
            padding: 15px;
			 
        }
        .storyLegend button {
            border: 2px solid #411093;
            padding: 10px;
            font-size: 1em;
            width: 50px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="story">
            <div id="text"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte
        var map = L.map('map').setView([43.944827228888734, 4.816506893623895], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Fonction pour créer des icônes colorées
        function createColoredIcon(color) {
            return L.divIcon({
                html: `
                    <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 0 C24.8366 0 32 7.16344 32 16 C32 24.8366 24.8366 32 16 32 C7.16344 32 0 24.8366 0 16 C0 7.16344 7.16344 0 16 0 Z" fill="${color}" />
                        <path d="M16 5 C10.4775 5 6 9.48242 6 15.0114 C6 24.5152 16 31 16 31 C16 31 26 24.5152 26 15.0114 C26 9.48242 21.5225 5 16 5 Z" fill="white" stroke="${color}" stroke-width="2" />
                    </svg>
                `,
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                className: 'custom-svg-icon'
            });
        }

        // Tableau des markers
        var markers = [
            {
                coords: [43.94437, 4.8165],
                id: 2,
                text: `
                    <div>
                        <h3>Titre 1</h3>
                        <p><<figure>
<img src="images/Lachenal-Mazan_Orange.jpeg" style="max-width: 100%; height: auto;">
			<figcaptation style="font-style: italic; color: #666;"légende</figcaption>
        </figure></p>
                    </div>
                `,
                icon: createColoredIcon('#FF0000')
            },
            {
                coords: [43.94408, 4.81595],
                id: 3,
                text: `
                    <div>
                        <h3>Exemple 2</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94496, 4.81422],
                id: 4,
                text: `
                    <div>
                        <h3>Exemple 3</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94514, 4.81382],
                id: 5,
                text: `
                    <div>
                        <h3>Exemple 3</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94929, 4.81031],
                id: 5,
                text: `
                    <div>
                        <h3>Exemple 3</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94838, 4.80724],
                id: 6,
                text: `
                    <div>
                        <h3>Exemple 3</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.95061, 4.81321],
                id: 7,
                text: `
                    <div>
                        <h3>Exemple 3</h3>

            },

            },

                `,

                id: 14,

                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
        ];

        // Initialisation de l'index et de l'élément texte
        var index = 1;
        var textElement = document.getElementById("text");
       textElement.innerHTML = `
    <div>
        <h3>Bienvenue !</h3>
        <p>Pour débuter la navigation fermer la fenêtre d'introduction et cliquer sur suivant en bas à droite</p>
    </div>
`;
        // Légende avec boutons Précédent/Suivant
        let legend = L.control({ position: "bottomright" });
        legend.onAdd = function(map) {
            let div = L.DomUtil.create("div", "storyLegend");
            div.innerHTML = `
                <button id="prev">Préc</button>
                <button id="next">Suiv</button>
            `;
            let next = div.querySelector("#next");
            next.onclick = function(e) {
                index = (index + 1) % markers.length;
                moveMap(index);
            };
            let prev = div.querySelector("#prev");
            prev.onclick = function(e) {
                index = (index - 1 + markers.length) % markers.length;
                moveMap(index);
            };
            return div;
        };
        legend.addTo(map);

        // Fonction pour centrer la carte et mettre à jour le texte
        function moveMap(index) {
            var marker = markers[index];
            map.flyTo(marker.coords, 18);
            textElement.innerHTML = marker.text; //  Met à jour le texte
        }

        // Ajout des markers à la carte
        markers.forEach(function(marker, i) {
            L.marker(marker.coords, {icon: marker.icon})
                .addTo(map)
                .on("click", function() {
                    index = i;
                    moveMap(index);
                });
				});
    </script>
</body>
</html>
