<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #container {
            display: grid;
            grid-template-columns: 2fr 3fr;
        }
        #map, #story {
     height: 100vh;
        }
        #story {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #text {
            flex: 1;
            overflow-y: auto;
        }
        .storyLegend {
            border: 2px solid #411093;
            background: #fff;
            color: #000;
            padding: 15px;
			 
        }
        .storyLegend button {
            border: 2px solid #411093;
            padding: 10px;
            font-size: 1em;
            width: 50px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="container">
        <div id="story">
            <div id="text"></div>
        </div>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Initialisation de la carte
        var map = L.map('map').setView([43.944827228888734, 4.816506893623895], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Fonction pour créer des icônes colorées
        function createColoredIcon(color) {
            return L.divIcon({
                html: `
                    <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 0 C24.8366 0 32 7.16344 32 16 C32 24.8366 24.8366 32 16 32 C7.16344 32 0 24.8366 0 16 C0 7.16344 7.16344 0 16 0 Z" fill="${color}" />
                        <path d="M16 5 C10.4775 5 6 9.48242 6 15.0114 C6 24.5152 16 31 16 31 C16 31 26 24.5152 26 15.0114 C26 9.48242 21.5225 5 16 5 Z" fill="white" stroke="${color}" stroke-width="2" />
                    </svg>
                `,
                iconSize: [32, 32],
                iconAnchor: [16, 32],
                className: 'custom-svg-icon'
            });
        }

        // Tableau des markers
        var markers = [
            {
                coords: [43.94437, 4.8165],
                id: 1,
                text: `
                    <div>
                        <h3>  1. Plaidoirie de la défense en trois actes (11 décembre 2024) :<em> « L’opinion publique est venue pourrir ce procès »</em></h3>
                        <p> <Strong>Acte 1. </strong>Réhabilitation des accusés : ces bons pères de famille-collègues-voisins le cœur sur la main ne sont pas des &laquo garçons &raquo qui violent. D’ailleurs, l’un deux s’est présenté au domicile des Pelicot dans la journée, or &laquo on ne viole pas à midi ! &raquo. Le script du viol ancré, et à ancrer, dans les imaginaires met en scène des hommes marginaux et brutaux, ou des &laquo monstres &raquo, s’attaquant la nuit à une &laquo belle fille &raquo dans une &laquo rue sombre &raquo.
Rappelons qu’en France, chaque heure 26 femmes sont victimes de viol, de tentative de viol, ou d’agression sexuelle. Soit toutes les 2 minutes 30. Dans 61% des cas, l’agresseur est connu personnellement : un voisin, un ami, un collègue et, <a href="https://mobile.interieur.gouv.fr/Interstats/L-enquete-Vecu-et-ressenti-en-matiere-de-securite-VRS" style="color: blue; text-decoration: underline; font-weight: none;" target="_blank">dans 28 % des cas,</a>, c’est un conjoint ou un ex-conjoint.<br>

<strong>Acte 2.</strong> Victimisation secondaire : Gisèle Pelicot  &laquo cette femme si intelligente &raquo , n’aurait pas vu clair dans le jeu de son mari après des années de vie commune. S’en étonner et insinuer qu’elle est complice d’un jeu libertin… D’ailleurs, la victime fait du sein nu à la plage. Piétiner le statut de victime.
Rappelons encore que 3 sur 10 des victimes de viol, de tentative de viol, ou d’agression sexuelle gardent le silence. Pour les victimes qui portent plainte,  <a href="https://www.ipp.eu/publication/le-traitement-judiciaire-des-violences-sexuelles-et-conjugales-en-france/" style="color: blue; text-decoration: underline; font-weight: none;" target="_blank">86 % pour des plaintes</a> sont classées sans suite. <br>

<strong>Acte 3.</strong> Inversion de la culpabilité. En plus de l’acquittement, demande est faite que soit &laquo lavé l’honneur &raquo de ces &laquo garçons &raquo , victimes de Pelicot et de la &laquo vox populi&raquo . Se retourner pour fustiger le public de la salle d’audience, pour la plupart des femmes journalistes et chercheuses. Discréditer leur présence, leur écriture, leur analyse, leur influence. Au-delà, délégitimer l’émoi et la colère des femmes. Car, rappelons enfin, que <a href="https://mobile.interieur.gouv.fr/Interstats/L-enquete-Vecu-et-ressenti-en-matiere-de-securite-VRS" style="color: blue; text-decoration: underline; font-weight: none;" target="_blank">moins de 1% des viols</a> rapportés par des femmes majeures ont fait l’objet d’une condamnation en 2022.<br>
						<figure>
<img src="images/Lachenal-Mazan_Orange.jpeg" style="max-width: 100%; height: auto;">
			<figcaptation style="font-style: italic; color: #666;">Devant le Palais de justice. Oranges amenées par quelques manifestantes, comme symbole des peines de détention souhaitées, et laissées contre un mur, sur le trottoir, le jour du verdict sur demande des CRS qui les envisagent comme de &laqo possible projectiles&raquo <br>Crédit Lachenal, décembre 2024"</figcaption>
        </figure></p>
                    </div>
                `,
                icon: createColoredIcon('#FF0000')
            },
            {
                coords: [43.94408, 4.81595],
                id: 2,
                text: `
                    <div>
                        <h3>Exemple 2</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.944772, 4.814093],
                id: 3,
                text: `
                    <div>
                        <h3>Exempl 3</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94501, 4.81389],
                id: 4,
                text: `
                    <div>
                        <h3>Exemple 4</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94929, 4.81031],
                id: 5,
                text: `
                    <div>
                        <h3>Exemple5</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.94828, 4.80721],
                id: 6,
                text: `
                    <div>
                        <h3>Exemple 6</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
			{
                coords: [43.950455, 4.813160],
                id: 7,
                text: `
                    <div>
                        <h3>Exemple7</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.949067, 4.809303],
                id: 8,
                text: `
                    <div>
                        <h3>Exemple 8</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },			
				{
                coords: [43.943605, 4.811939],
                id: 9,
                text: `
                    <div>
                        <h3>Exemple9</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.941777, 4.815515],
                id: 10,
                text: `
                    <div>
                        <h3>Exemple 10</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.949760, 4.815960],
                id: 11,
                text: `
                    <div>
                        <h3>Exemple 11</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.94457, 4.81594],
                id: 12,
                text: `
                    <div>
                        <h3>Exemple 12</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.95094, 4.80768],
                id: 13,
                text: `
                    <div>
                        <h3>Exemple 13</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
				{
                coords: [43.94212, 4.80525],
                id: 14,
                text: `
                    <div>
                        <h3>Exemple 14</h3>
                        <p>Exemple de texte 2</p>
                    </div>
                `,
                icon: createColoredIcon('#00FF00')
            },
        ];

        // Initialisation de l'index et de l'élément texte
        var index = 0;
        var textElement = document.getElementById("text");
      textElement.innerHTML = markers[0].text; 
		
        // Légende avec boutons Précédent/Suivant
        let legend = L.control({ position: "bottomright" });
        legend.onAdd = function(map) {
            let div = L.DomUtil.create("div", "storyLegend");
            div.innerHTML = `
                <button id="prev">Préc</button>
                <button id="next">Suiv</button>
            `;
            let next = div.querySelector("#next");
            next.onclick = function(e) {
                index = (index + 1) % markers.length;
                moveMap(index);
            };
            let prev = div.querySelector("#prev");
            prev.onclick = function(e) {
                index = (index - 1 + markers.length) % markers.length;
                moveMap(index);
            };
            return div;
        };
        legend.addTo(map);

        // Fonction pour centrer la carte et mettre à jour le texte
        function moveMap(index) {
            var marker = markers[index];
            map.flyTo(marker.coords, 18);
            textElement.innerHTML = marker.text; //  Met à jour le texte
        }

        // Ajout des markers à la carte
        markers.forEach(function(marker, i) {
            L.marker(marker.coords, {icon: marker.icon})
                .addTo(map)
                .on("click", function() {
                    index = i;
                    moveMap(index);
                });
				});
    </script>
</body>
</html>
